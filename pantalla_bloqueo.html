<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso del Sistema</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #0b1120;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 1. ANIMACIONES DE FONDO (ORBES FLOTANTES) */
        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: floatShape 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .shape1 { width: 400px; height: 400px; background: #3b82f6; top: -10%; left: -10%; }
        .shape2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -20%; right: -10%; animation-delay: -5s; }
        .shape3 { width: 300px; height: 300px; background: #e11d48; top: 40%; left: 40%; animation-duration: 15s; }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* 2. TARJETA PRINCIPAL CON GLASSMORPHISM Y ENTRADA CON REBOTE */
        .modal {
            background: rgba(30, 41, 59, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            /* Aquí está la animación de entrada */
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0.8);
            opacity: 0;
        }

        @keyframes popIn {
            to { transform: scale(1); opacity: 1; }
        }

        /* 3. ICONO CON ANIMACIÓN DE LATIDO INTENSO */
        .icon-box {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
            animation: heartbeat 2s infinite;
        }

        .icon-box svg {
            width: 45px;
            height: 45px;
            color: white;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }
            15% { transform: scale(1.15); box-shadow: 0 0 50px rgba(239, 68, 68, 0.8); }
            30% { transform: scale(1); box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }
            45% { transform: scale(1.15); box-shadow: 0 0 50px rgba(239, 68, 68, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }
        }

        h1 {
            margin: 0 0 15px;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.message {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .contact-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.3);
            margin-bottom: 35px;
            animation: glowText 3s infinite alternate;
        }

        @keyframes glowText {
            from { box-shadow: 0 0 5px rgba(59, 130, 246, 0); }
            to { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid #334155;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            font-family: monospace;
        }

        /* 5. ANIMACIÓN AL HACER CLIC EN EL INPUT */
        input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* 4. DESTELLO DE LUZ EN EL BOTÓN */
        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        .sys-alert {
            margin-top: 20px;
            background: rgba(220, 38, 38, 0.15);
            color: #fca5a5;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(220, 38, 38, 0.3);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="modal">
        <div class="icon-box">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>
        
        <h1>Atención del Sistema</h1>
        <p class="message">Uno o más complementos necesarios para el funcionamiento de tu código están desactivados.</p>
        <div class="contact-badge">Por favor contacta a PrologicSoft</div>
        
        <form method="POST">
            <div class="input-group">
                <input type="text" name="sys_recovery_token" placeholder="XXXXX" required autocomplete="off">
            </div>
            <button type="submit">Validar Complementos</button>
        </form>
        
        [[SYS_ERROR_MSG]]
    </div>
</body>
</html>
